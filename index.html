<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的迷因收藏站 | MemePulse</title>
    <!-- 引入样式库 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; background: #0a0a0f; color: #fff; }
        .meme-card { background: #1a1a2e; border-radius: 12px; overflow: hidden; transition: transform 0.3s; }
        .meme-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(255,0,110,0.3); }
        .platform-tag { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .ig { background: linear-gradient(45deg, #f09433, #bc1888); }
        .yt { background: #ff0000; }
        .dy { background: #fe2c55; }
        .bl { background: #00a1d6; }
        .add-btn { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: #ff006e; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; box-shadow: 0 4px 20px rgba(255,0,110,0.5); }
    </style>
</head>
<body class="min-h-screen p-6">
    <!-- 头部 -->
    <header class="max-w-6xl mx-auto mb-8 text-center">
        <h1 class="text-4xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-cyan-500">
            🔥 我的迷因收藏
        </h1>
        <p class="text-gray-400">每天8点 & 13点更新 | 个人精选版</p>
    </header>

    <!-- 添加按钮 -->
    <div class="add-btn" onclick="openAddModal()" title="添加新迷因">+</div>

    <!-- 筛选按钮 -->
    <div class="max-w-6xl mx-auto mb-6 flex gap-3 flex-wrap justify-center">
        <button onclick="filter('all')" class="px-4 py-2 rounded-full bg-pink-600 text-sm font-bold">全部</button>
        <button onclick="filter('instagram')" class="px-4 py-2 rounded-full bg-gray-800 hover:bg-pink-600 text-sm transition">Instagram</button>
        <button onclick="filter('youtube')" class="px-4 py-2 rounded-full bg-gray-800 hover:bg-red-600 text-sm transition">YouTube</button>
        <button onclick="filter('douyin')" class="px-4 py-2 rounded-full bg-gray-800 hover:bg-pink-500 text-sm transition">抖音</button>
        <button onclick="filter('bilibili')" class="px-4 py-2 rounded-full bg-gray-800 hover:bg-blue-500 text-sm transition">B站</button>
    </div>

    <!-- 迷因展示区域 -->
    <div id="meme-container" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- 迷因卡片会显示在这里 -->
    </div>

    <!-- 添加迷因的弹窗 -->
    <div id="add-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:50; padding:20px; overflow-y:auto;">
        <div class="max-w-md mx-auto bg-gray-900 rounded-2xl p-6 mt-10 border border-pink-500/30">
            <h2 class="text-2xl font-bold mb-4">添加新迷因</h2>
            <input type="text" id="input-title" placeholder="标题（如：Skibidi Toilet新集）" class="w-full mb-3 p-3 bg-gray-800 rounded-lg text-white placeholder-gray-500">
            <input type="text" id="input-url" placeholder="图片/视频链接" class="w-full mb-3 p-3 bg-gray-800 rounded-lg text-white placeholder-gray-500">
            <select id="input-platform" class="w-full mb-3 p-3 bg-gray-800 rounded-lg text-white">
                <option value="instagram">Instagram</option>
                <option value="youtube">YouTube</option>
                <option value="douyin">抖音</option>
                <option value="bilibili">B站</option>
                <option value="twitter">Twitter/X</option>
                <option value="reddit">Reddit</option>
            </select>
            <input type="text" id="input-tags" placeholder="标签，用逗号分隔（如：病毒,动画,搞笑）" class="w-full mb-4 p-3 bg-gray-800 rounded-lg text-white placeholder-gray-500">
            <div class="flex gap-3">
                <button onclick="addMeme()" class="flex-1 py-3 bg-pink-600 rounded-lg font-bold">保存</button>
                <button onclick="closeAddModal()" class="flex-1 py-3 bg-gray-700 rounded-lg">取消</button>
            </div>
        </div>
    </div>

    <script>
        // 从浏览器本地存储读取数据，如果没有则使用默认数据
        let memes = JSON.parse(localStorage.getItem('myMemes')) || [
            {
                id: 1,
                title: "Skibidi Toilet 第50集",
                platform: "youtube",
                image: "https://picsum.photos/seed/skibidi/400/300",
                tags: ["病毒", "动画", "GenAlpha"],
                date: "2026-03-24",
                heat: 98
            },
            {
                id: 2,
                title: "Girl Dinner美学",
                platform: "instagram",
                image: "https://picsum.photos/seed/dinner/400/400",
                tags: ["生活方式", "反讽"],
                date: "2026-03-24",
                heat: 85
            },
            {
                id: 3,
                title: "科目三全球传播",
                platform: "douyin",
                image: "https://picsum.photos/seed/kemu3/400/300",
                tags: ["舞蹈", "文化输出"],
                date: "2026-03-23",
                heat: 92
            }
        ];

        // 显示迷因
        function renderMemes(filterPlatform = 'all') {
            const container = document.getElementById('meme-container');
            const filtered = filterPlatform === 'all' 
                ? memes 
                : memes.filter(m => m.platform === filterPlatform);
            
            container.innerHTML = filtered.map(meme => `
                <div class="meme-card group cursor-pointer" onclick="viewMeme(${meme.id})">
                    <div class="relative aspect-video bg-gray-800">
                        <img src="${meme.image}" alt="${meme.title}" class="w-full h-full object-cover">
                        <span class="platform-tag ${meme.platform === 'instagram' ? 'ig' : meme.platform === 'youtube' ? 'yt' : meme.platform === 'douyin' ? 'dy' : 'bl'} absolute top-2 left-2 text-white">
                            ${meme.platform}
                        </span>
                        <button onclick="event.stopPropagation(); deleteMeme(${meme.id})" class="absolute top-2 right-2 w-8 h-8 bg-red-500 rounded-full text-white opacity-0 group-hover:opacity-100 transition">×</button>
                    </div>
                    <div class="p-4">
                        <h3 class="font-bold mb-2">${meme.title}</h3>
                        <div class="flex flex-wrap gap-2 mb-2">
                            ${meme.tags.map(tag => `<span class="text-xs text-pink-400">#${tag}</span>`).join('')}
                        </div>
                        <div class="flex justify-between text-xs text-gray-500">
                            <span>${meme.date}</span>
                            <span>🔥 ${meme.heat}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 筛选
        function filter(platform) {
            renderMemes(platform);
        }

        // 打开添加弹窗
        function openAddModal() {
            document.getElementById('add-modal').style.display = 'block';
        }

        // 关闭添加弹窗
        function closeAddModal() {
            document.getElementById('add-modal').style.display = 'none';
            // 清空输入
            document.getElementById('input-title').value = '';
            document.getElementById('input-url').value = '';
            document.getElementById('input-tags').value = '';
        }

        // 添加新迷因
        function addMeme() {
            const title = document.getElementById('input-title').value;
            const url = document.getElementById('input-url').value || `https://picsum.photos/seed/${Date.now()}/400/300`;
            const platform = document.getElementById('input-platform').value;
            const tags = document.getElementById('input-tags').value.split(',').map(t => t.trim()).filter(t => t);
            
            if (!title) {
                alert('请输入标题');
                return;
            }

            const newMeme = {
                id: Date.now(),
                title: title,
                platform: platform,
                image: url,
                tags: tags.length > 0 ? tags : ['未分类'],
                date: new Date().toISOString().split('T')[0],
                heat: Math.floor(Math.random() * 20) + 80 // 随机热度80-100
            };

            memes.unshift(newMeme); // 添加到最前面
            localStorage.setItem('myMemes', JSON.stringify(memes)); // 保存到浏览器
            renderMemes();
            closeAddModal();
        }

        // 删除迷因
        function deleteMeme(id) {
            if (confirm('确定删除这个迷因？')) {
                memes = memes.filter(m => m.id !== id);
                localStorage.setItem('myMemes', JSON.stringify(memes));
                renderMemes();
            }
        }

        // 查看迷因（简单版）
        function viewMeme(id) {
            const meme = memes.find(m => m.id === id);
            alert(`标题：${meme.title}\n平台：${meme.platform}\n标签：${meme.tags.join(', ')}\n\n提示：实际使用中可以跳转到原链接`);
        }

        // 页面加载时显示
        renderMemes();
    </script>
</body>
</html>
